name: Generate pSEO Pages

on:
  push:
    branches: [main]
    paths:
      - 'pages-config.json'
      - '_template.html'
      - '.github/scripts/generate-pages.js'
      - '.github/workflows/build-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate pages
        run: node .github/scripts/generate-pages.js

      - name: Commit generated pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate pSEO pages [skip ci]"
